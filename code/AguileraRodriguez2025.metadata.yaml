  stimulus_type: visual + auditory cue
  study_design: 'Comparison of traditional cue-based vs gamified (Pac-man) paradigms for imagined speech BCI. Traditional
    paradigm: visual+auditory cue with 5 beeps at T=1.4s rhythm, subject imagines speech for 7 repetitions, last 3 extracted
    for analysis. 2s rest between trials. Gamified paradigm: The experiment started with a maze appearing on the screen, composed
    of white borders, progress dots, and checkpoints represented by cookies. The trial was divided into four steps: (1) movement
    decision, (2) imagined speech, (3) vocalized speech, and (4) character movement. The first three steps were performed
    each in period T=1.4s. The trial starts with white borders, the character standing still, and an auxiliary arrow pointing
    in the next correct direction. Based on the way the character was faced, the user must decide which word is adequate to
    achieve the goal (movement decision). Then, the maze borders turn green, indicating the participant must imagine pronouncing
    the previously decided word (imagined speech).'
